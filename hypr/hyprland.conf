# ══════════════════════════════════════════════════════════════
#  Hyprland config
#  Kleuren komen uit colors.conf — gegenereerd door matugen
#  Pas $terminal en $browser aan naar wat jij gebruikt
# ══════════════════════════════════════════════════════════════

source = ~/.config/hypr/colors.conf

# ── monitor ──────────────────────────────────────────────────
# preferred = gebruik de native resolutie van je scherm
monitor = ,preferred,auto,1

# ── programmas ───────────────────────────────────────────────
$terminal       = alacritty
$menu           = rofi -show run
$browser        = vivaldi
$musicplayer    = spotify-launcher
$onlinechat     = discord
$fillemaneger   = dolphin
$codeeditor     = vscodium-wayland
$pcbeditor      = kicad
$3ddezine       = freecad

# ── autostart ────────────────────────────────────────────────
exec-once = $XDG_DATA_HOME/quickshell-dotfiles/scripts/backgroundSwicher/init_wallpaper.sh
exec-once = qs
exec-once = $browser
exec-once = $musicplayer
exec-once = $onlinechat

# ── omgevingsvariabelen ──────────────────────────────────────
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct

# ── input ────────────────────────────────────────────────────
input {
    kb_layout  = us
    numlock_by_default = true

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll    = false
        disable_while_typing = true
    }
}

# ── algemeen ─────────────────────────────────────────────────
general {
    gaps_in  = 5
    gaps_out = 10
    border_size = 2

    layout = dwindle
    allow_tearing = false
}

# ── decoratie ────────────────────────────────────────────────
decoration {
    rounding = 8

    blur {
        enabled  = true
        size     = 4
        passes   = 1
        vibrancy = 0.1696
    }
}

# ── animaties — uitgeschakeld ─────────────────────────────────
animations {
    enabled = false
}

# ── dwindle layout ───────────────────────────────────────────
dwindle {
    preserve_split = true
}

# ── venster regel ───────────────────────────────────────────
hl.window_rule = border_size 10, class:^(my-window)$
hl.window_rule = workspace 9 silent,class:^($musicplayer)$
hl.window_rule = workspace 9 silent,class:^($onlinechat)$

# ══════════════════════════════════════════════════════════════
#  Toetsenbord snelkoppelingen
# ══════════════════════════════════════════════════════════════

$mod = SUPER

# ── programmas starten ───────────────────────────────────────
bind = $mod,       Return, exec,          $terminal
bind = $mod,       Space,  exec,          $menu
bind = $mod,       E,      exec,          $browser
bind = $mod,       L,      exec,          $musicplayer
bind = $mod,       I,      exec,          $onlinechat
bind = $mod,       F,      exec,          $fillemaneger
bind = $mod,       C,      exec,          $codeeditor
bind = $mod,       P,      exec,          $pcbeditor
bind = $mod,       O,      exec,          $3ddezine

bind = $mod SHIFT, S,      exec,          hyprshot -m region

# ── venster beheer ───────────────────────────────────────────
bind = $mod,       Q,      killactive
bind = $mod,       A,      fullscreen
bind = $mod,       S,      togglefloating
bind = $mod,       U,      pseudo          # dwindle
bind = $mod,       J,      layoutmsg, togglesplit     # dwindle

# ── focus wisselen (pijltjestoetsen) ─────────────────────────
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# ── venster verplaatsen ───────────────────────────────────────
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# ── workspaces 1 t/m 9 ───────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# ── venster naar workspace sturen ────────────────────────────
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# ── scrollen door workspaces met scrollwiel ───────────────────
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# ── vensters verplaatsen / grootte aanpassen met muis ─────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── audio (werkt met pipewire + wireplumber) ──────────────────
bind = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# ── helderheid (werkt met brightnessctl) ─────────────────────
bind = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ── Hyprland afsluiten ───────────────────────────────────────
bind = $mod SHIFT, L, exit